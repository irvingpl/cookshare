# ⚠ 로컬 테스트용 — 실제 시크릿 값은 절대 커밋하지 말 것
# 프로덕션에서는 Sealed Secrets / External Secrets / Vault 사용 권장
#
# 사용 예시:
#   kubectl create secret generic backend-secret \
#     --from-literal=JWT_SECRET="$(openssl rand -base64 32)" \
#     -n cookshare
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: cookshare
type: Opaque
stringData:
  JWT_SECRET: 'local-dev-jwt-secret-change-before-any-real-use'
