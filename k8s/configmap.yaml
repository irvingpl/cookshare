apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: cookshare
data:
  NODE_ENV: 'development'
  PORT: '4000'
  # SQLite DB를 PVC에 마운트된 /data 아래에 저장
  DB_PATH: '/data/cookshare.db'
  # 업로드 파일도 PVC 내 별도 디렉토리 사용
  UPLOAD_DIR: '/data/uploads'
  # 업로드 이미지 URL 생성 기준
  BASE_URL: 'http://cookshare.local'
  # CORS 허용 오리진
  CLIENT_URL: 'http://cookshare.local'
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: cookshare
data:
  NODE_ENV: 'development'
  # 브라우저가 직접 호출하는 API 주소
  # Ingress를 통해 /api/* → backend 서비스로 라우팅됨
  NEXT_PUBLIC_API_URL: 'http://cookshare.local'
